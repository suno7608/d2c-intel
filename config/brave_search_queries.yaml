# --- 인텔리전스 필라 ---
pillars:
  - name: Consumer Sentiment
    id: consumer_sentiment
    query_suffixes:
      en: ["review", "complaint", "customer experience", "problem", "issue", "after service"]
      de: ["Bewertung", "Beschwerde", "Erfahrung", "Kundendienst", "Reklamation"]
      fr: ["avis", "plainte", "problème", "SAV", "service après-vente"]
      es: ["reseña", "queja", "problema", "servicio postventa", "opinión"]
      it: ["recensione", "problema", "esperienza", "assistenza clienti"]
      pt: ["avaliação", "reclamação", "problema", "assistência técnica"]
      th: ["รีวิว", "ปัญหา", "ประสบการณ์", "บริการหลังการขาย", "ศูนย์บริการ"]
      zh: ["評價", "問題", "客服", "維修"]
      ar: ["review", "problem", "customer service", "complaint"]
      tr: ["yorum", "şikayet", "sorun", "müşteri hizmeti", "deneyim"]

  - name: Retail Channel Promotion
    id: retail_channel_promotion
    query_suffixes:
      en: ["deal", "promotion", "discount", "sale", "coupon", "clearance"]
      de: ["Angebot", "Rabatt", "Aktion", "Schnäppchen"]
      fr: ["promo", "réduction", "soldes", "bon plan"]
      es: ["oferta", "descuento", "promoción", "rebaja"]
      it: ["offerta", "sconto", "promozione", "saldi"]
      pt: ["promoção", "desconto", "oferta", "liquidação"]
      th: ["โปรโมชั่น", "ลดราคา", "ส่วนลด", "ดีล"]
      zh: ["優惠", "折扣", "特價", "促銷"]
      ar: ["deal", "discount", "offer", "sale"]
      tr: ["indirim", "kampanya", "fırsat", "promosyon"]

  - name: Price Intelligence
    id: price_intelligence
    query_suffixes:
      en: ["price", "vs", "comparison", "pricing", "worth buying"]
      de: ["Preis", "Vergleich", "Preisvergleich", "lohnt sich"]
      fr: ["prix", "comparatif", "tarif", "vaut le coup"]
      es: ["precio", "comparativa", "comparación", "vale la pena"]
      it: ["prezzo", "confronto", "comparazione", "vale la pena"]
      pt: ["preço", "comparação", "comparativo", "vale a pena"]
      th: ["ราคา", "เปรียบเทียบ", "คุ้มค่า"]
      zh: ["價格", "比較", "值得買"]
      ar: ["price", "comparison", "worth buying"]
      tr: ["fiyat", "karşılaştırma", "değer mi"]

  - name: Chinese Brand Threat
    id: chinese_brand_threat
    brands: [TCL, Hisense, Haier, Midea]
    query_patterns:
      en: ["{brand} {product} price", "{brand} {product} review", "{brand} vs LG {product}", "{brand} {product} market share"]
      de: ["{brand} {product} Preis", "{brand} vs LG", "{brand} {product} Test"]
      fr: ["{brand} {product} prix", "{brand} vs LG", "{brand} {product} avis"]
      es: ["{brand} {product} precio", "{brand} vs LG"]
      it: ["{brand} {product} prezzo", "{brand} vs LG"]
      pt: ["{brand} {product} preço", "{brand} vs LG"]
      th: ["{brand} {product} ราคา", "{brand} vs LG {product} เปรียบเทียบ"]
      zh: ["{brand} {product} 價格", "{brand} vs LG"]
      ar: ["{brand} {product} price", "{brand} vs LG"]
      tr: ["{brand} {product} fiyat", "{brand} vs LG karşılaştırma"]

# --- 검색 파라미터 ---
search_params:
  count: 10                  # 검색당 결과 수
  freshness: pw              # 지난 1주일 (past week)
  results_per_query: 10
  rate_limit_delay_ms: 1500  # API 호출 간 딜레이 (ms) — Brave $5 plan: 1 req/sec
  max_retries: 5             # 실패 시 재시도 횟수
  retry_delay_ms: 2000       # 재시도 간 딜레이 (ms)
  consecutive_429_abort: 10  # 연속 429 N회 시 전체 수집 중단 (월간 쿼터 소진 방어)

# --- 품질 기준 ---
quality_gates:
  min_total_records: 400
  min_countries: 14          # 17개국 중 최소 14개국 (fallback 고려)
  min_tv: 80
  min_refrigerator: 80
  min_washing_machine: 80
  min_monitor: 40
  min_gram: 20
  max_tv_ratio: 0.45

# --- 검색 결과 페이지 보강 추출 (Scrapling/lxml) ---
scrapling_enrichment:
  enabled: true
  timeout_seconds: 12
  max_fetches: 80
  max_fetches_per_domain: 4
  blocked_domains:
    - facebook.com
    - instagram.com
    - linkedin.com
    - pinterest.com
    - tiktok.com
    - x.com
    - twitter.com
    - youtube.com

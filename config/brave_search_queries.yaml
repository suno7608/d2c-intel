# --- 제품 설정 ---
products:
  - name: TV
    subcategories: [OLED, QNED, UHD]
    min_records: 80
    max_ratio: 0.45
    queries:
      en: ["LG OLED TV deal", "LG QNED TV price", "LG UHD TV review", "TCL Mini LED price", "Hisense TV deal", "Samsung TV vs LG TV 2026"]
      de: ["LG OLED Fernseher Angebot", "Hisense TV Preis", "TCL TV Angebot", "Samsung TV vs LG Fernseher"]
      fr: ["LG TV OLED promo", "TCL TV prix", "Hisense TV offre", "Samsung TV vs LG comparatif"]
      es: ["LG televisor OLED oferta", "Hisense TV precio", "TCL TV oferta", "Samsung TV vs LG comparativa"]
      it: ["LG OLED TV offerta", "TCL TV prezzo", "Hisense TV offerta", "Samsung TV vs LG confronto"]
      pt: ["LG TV OLED promoção", "TCL TV preço", "Hisense TV Brasil", "Samsung TV vs LG TV"]
      th: ["LG TV ราคา", "TCL TV ราคา", "Hisense ทีวี ราคา", "Samsung TV เปรียบเทียบ LG", "ทีวี OLED รีวิว"]
      zh: ["LG 電視 優惠", "海信 電視 價格", "TCL 電視 比較 LG"]
      ar: ["LG TV price", "Hisense TV deal", "Samsung TV vs LG", "TCL TV review"]
      tr: ["LG OLED TV fiyat", "TCL TV fiyat", "Hisense TV Türkiye", "Samsung TV vs LG karşılaştırma"]


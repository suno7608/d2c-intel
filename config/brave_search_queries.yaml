      de: ["LG Monitor Angebot", "LG UltraGear Deutschland", "Samsung Odyssey vs LG Monitor"]
      fr: ["LG moniteur gaming", "LG écran 4K prix", "Samsung moniteur vs LG"]
      es: ["LG monitor gaming oferta", "LG monitor 4K precio", "Samsung monitor vs LG"]
      it: ["LG monitor gaming offerta", "LG monitor 4K prezzo", "Samsung monitor vs LG"]
      pt: ["LG monitor gamer promoção", "LG monitor 4K", "Samsung monitor vs LG"]
      th: ["LG มอนิเตอร์ ราคา", "LG UltraGear รีวิว"]
      zh: ["LG 螢幕 優惠", "LG UltraGear 台灣", "Samsung 螢幕 vs LG"]
      ar: ["LG monitor price", "LG gaming monitor", "Samsung monitor vs LG"]
      tr: ["LG monitor fiyat", "LG UltraGear Türkiye"]

  - name: LG gram
    subcategories: [Laptop]
    min_records: 20
    queries:
      en: ["LG gram laptop deal", "LG gram 2026 review", "LG gram Aerominum"]
      de: ["LG gram Angebot Deutschland", "LG gram Laptop Test"]
      fr: ["LG gram ordinateur portable prix"]

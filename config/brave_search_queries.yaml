      zh: ["LG 冰箱 優惠", "海爾 冰箱 台灣", "三星 冰箱 比較"]
      ar: ["LG refrigerator price", "Haier fridge deal", "Samsung fridge vs LG", "LG fridge review"]
      tr: ["LG buzdolabı fiyat", "Haier buzdolabı", "Samsung buzdolabı vs LG", "LG buzdolabı yorum şikayet"]

  - name: Washing Machine
    subcategories: [Front Loader, Top Loader]
    min_records: 80
    queries:
      en: ["LG washing machine deal", "LG front loader review", "Samsung washer vs LG", "Midea washing machine", "Haier washer price", "LG washer problem complaint"]
      de: ["LG Waschmaschine Angebot", "Haier Waschmaschine", "Midea Waschmaschine Preis", "LG Waschmaschine Erfahrung Problem"]
      fr: ["LG lave-linge promo", "Haier lave-linge France", "Samsung lave-linge", "LG lave-linge avis problème"]
      es: ["LG lavadora oferta", "Midea lavadora", "Samsung lavadora precio", "LG lavadora problema queja"]
      it: ["LG lavatrice offerta", "Midea lavatrice", "Haier lavatrice", "LG lavatrice problema recensione"]
      pt: ["LG máquina lavar promoção", "Midea máquina lavar", "Samsung lavadora", "LG máquina lavar problema"]
      th: ["LG เครื่องซักผ้า ราคา", "Midea เครื่องซักผ้า รีวิว", "Haier เครื่องซักผ้า", "Samsung เครื่องซักผ้า เปรียบเทียบ LG", "เครื่องซักผ้า LG ปัญหา"]
      zh: ["LG 洗衣機 價格", "海爾 洗衣機", "美的 洗衣機 比較"]
      ar: ["LG washing machine price", "Haier washer deal", "Samsung washer vs LG"]
      tr: ["LG çamaşır makinesi fiyat", "Haier çamaşır makinesi", "Samsung çamaşır makinesi vs LG", "LG çamaşır makinesi yorum"]

  - name: Monitor

# ============================================================
# D2C Weekly Intelligence Report — GitHub Actions Workflow
# ============================================================
# Schedule: 매주 일요일 07:00 UTC (16:00 KST)
# Pipeline: Brave Search → Claude Opus → Build → Quality Gate → Deploy → Email
# ============================================================

name: D2C Weekly Intelligence Report

on:
  schedule:
    - cron: '0 7 * * 0'     # Sunday 07:00 UTC = Sunday 16:00 KST
  workflow_dispatch:
    inputs:
      date_key:
        description: 'Report date (YYYY-MM-DD), default today KST'
        type: string
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "weekly-report"
  cancel-in-progress: false

env:
  TZ: Asia/Seoul
  ENABLE_PUBLISHABLE_BUILD: '1'
  ENABLE_QUALITY_GATE: '1'
  ENABLE_GOOGLE_TRANSLATE_FALLBACK: '1'
  ENABLE_OFFLINE_EN_STUB_FALLBACK: '1'

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ── Setup ──
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for stats comparison

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Install Playwright (Chromium for PDF)
        run: |
          npm install playwright
          npx playwright install chromium --with-deps
          # Add node_modules/.bin to PATH for all subsequent steps
          echo "${{ github.workspace }}/node_modules/.bin" >> $GITHUB_PATH

      - name: Verify Playwright
        run: playwright --version

      - name: Set script permissions
        run: chmod +x scripts/*.py scripts/*.sh

      - name: Set date key
        run: |
          if [ -n "${{ inputs.date_key }}" ]; then
            echo "DATE_KEY=${{ inputs.date_key }}" >> $GITHUB_ENV
          else
            echo "DATE_KEY=$(TZ=Asia/Seoul date +%F)" >> $GITHUB_ENV
          fi

      - name: Display configuration
        run: |
          echo "=== D2C Weekly Report Configuration ==="
          echo "Date key: ${{ env.DATE_KEY }}"
          echo "Model (Report): ${{ vars.CLAUDE_MODEL_REPORT }}"
          echo "Model (Translate): ${{ vars.CLAUDE_MODEL_TRANSLATE }}"
          echo "TZ: $TZ"
          echo "======================================="

      # ── Step 1: Data Collection ──
      - name: Collect search data (Brave Search → JSONL)
        timeout-minutes: 30
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: |
          echo "::group::Brave Search Collection"
          python scripts/d2c_search.py ${{ env.DATE_KEY }}
          echo "::endgroup::"
          echo "--- JSONL Stats ---"
          wc -l data/raw/openclaw_${{ env.DATE_KEY }}.jsonl || true

      # ── Step 1.5: Deep Fetch Enrichment (optional) ──
      - name: Deep fetch high-value URLs
        if: ${{ vars.ENABLE_DEEP_FETCH == '1' }}
        timeout-minutes: 15
        env:
          ENABLE_DEEP_FETCH: '1'
          DEEP_FETCH_MAX: ${{ vars.DEEP_FETCH_MAX || '50' }}
        run: |
          echo "::group::Deep Fetch Enrichment"
          pip install "scrapling[fetchers]" 2>/dev/null || echo "::warning::scrapling install failed"
          python scripts/d2c_deep_fetch.py ${{ env.DATE_KEY }} || echo "::warning::Deep fetch failed (non-blocking)"
          echo "::endgroup::"

      # ── Step 1.7: Price History Tracking ──
      - name: Track price changes
        run: |
          echo "::group::Price Tracking"
          python scripts/d2c_price_tracker.py ${{ env.DATE_KEY }} || echo "::warning::Price tracker failed (non-blocking)"
          echo "::endgroup::"

      # ── Step 2: Weekly Stats ──
      - name: Save weekly stats
        run: |
          bash scripts/save_weekly_stats.sh ${{ env.DATE_KEY }} || {
            echo "::warning::save_weekly_stats.sh failed (non-critical)"
          }

      # ── Step 3: Report Generation ──
      - name: Generate report (Claude Opus 4.5 → Markdown)
        timeout-minutes: 60
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL_REPORT: ${{ vars.CLAUDE_MODEL_REPORT }}
        run: |
          echo "::group::Claude Report Generation"
          python scripts/d2c_report_generator.py ${{ env.DATE_KEY }}
          echo "::endgroup::"
          echo "--- Report Size ---"
          ls -lh reports/md/*${{ env.DATE_KEY }}*.md || true

      # ── Step 4: Build (Translate + Render + PDF + Hub) ──
      - name: Build publishable report (KO/EN HTML + Hub + PDF)
        timeout-minutes: 30
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL_TRANSLATE }}
          CLAUDE_MODEL_TRANSLATE: ${{ vars.CLAUDE_MODEL_TRANSLATE }}
          CLAUDE_TRANSLATE_RUNNER: "${{ github.workspace }}/scripts/d2c_translator.py"
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          echo "::group::Build Publishable Report"
          bash scripts/build_publishable_report.sh ${{ env.DATE_KEY }}
          echo "::endgroup::"
          echo "--- Build Output ---"
          ls -lR reports/html/${{ env.DATE_KEY }}/ || true
          ls -lh reports/html/latest/hub.html || true
          ls -lh reports/pdf/*.pdf 2>/dev/null || true

      # ── Step 5: Quality Gate ──
      - name: Quality gate
        run: |
          echo "::group::Quality Gate"
          bash scripts/quality_gate_weekly.sh ${{ env.DATE_KEY }} || echo "⚠️ Quality gate warnings (non-blocking)"
          echo "::endgroup::"

      # ── Step 6: Git Commit ──
      - name: Commit generated reports
        run: |
          git config user.name "D2C Intel Bot"
          git config user.email "d2c-intel-bot@github.io"
          git add reports/ data/weekly_stats/ data/raw/ data/price_history/ logs/ || true
          git diff --cached --quiet && {
            echo "No changes to commit"
            exit 0
          }
          git commit -m "feat: add ${{ env.DATE_KEY }} weekly intelligence reports (automated)"
          git push

      # ── Step 6.5: Deploy to GitHub Pages ──
      # GitHub Pages는 master 브랜치의 reports/html/ 디렉토리를 직접 서빙합니다.
      # Step 6에서 이미 reports/를 master에 커밋+push 했으므로,
      # PDF를 html/pdf/에 복사하고 추가 커밋만 하면 됩니다.
      - name: Deploy reports to GitHub Pages
        run: |
          echo "::group::Deploy to Pages"
          # PDF를 html/pdf/ 디렉토리에 복사 (Pages에서 다운로드 가능하도록)
          mkdir -p reports/html/pdf reports/html/md
          cp reports/pdf/*.pdf reports/html/pdf/ 2>/dev/null || true
          cp reports/md/*${{ env.DATE_KEY }}*.md reports/html/md/ 2>/dev/null || true

          git add reports/html/pdf/ reports/html/md/ || true
          git diff --cached --quiet && echo "No additional Pages assets to commit" || {
            git commit -m "deploy: publish ${{ env.DATE_KEY }} PDF/MD assets to Pages"
            git push
          }
          echo "::endgroup::"

      # ── Step 7: Email (handled by local cron for Gmail API + subscriber lookup) ──
      # Email sending moved to local OpenClaw cron job (d2c-weekly-report-check)
      # Reason: Gmail API needs OAuth token refresh, Google Sheets subscriber lookup

      # ── Step 8: Summary ──
      - name: Job summary
        if: always()
        run: |
          echo "## 📊 D2C Weekly Report — ${{ env.DATE_KEY }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "data/raw/openclaw_${{ env.DATE_KEY }}.jsonl" ]; then
            RECORDS=$(wc -l < "data/raw/openclaw_${{ env.DATE_KEY }}.jsonl" | tr -d ' ')
            echo "- **Data collected:** ${RECORDS} records" >> $GITHUB_STEP_SUMMARY
          fi

          MD_FILE="reports/md/LG_Global_D2C_Weekly_Intelligence_${{ env.DATE_KEY }}_R2_16country.md"
          if [ -f "$MD_FILE" ]; then
            SIZE=$(ls -lh "$MD_FILE" | awk '{print $5}')
            echo "- **Report size:** ${SIZE}" >> $GITHUB_STEP_SUMMARY
          fi

          echo "- **Hub URL:** https://suno7608.github.io/d2c-intel/" >> $GITHUB_STEP_SUMMARY
          echo "- **Report URL:** https://suno7608.github.io/d2c-intel/reports/html/${{ env.DATE_KEY }}/index.html" >> $GITHUB_STEP_SUMMARY
